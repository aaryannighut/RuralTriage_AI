services:
  # Backend API Service
  - type: web
    name: ruraltriage-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/ruraltriage.db # Persistent disk Recommended for prod
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard
      - key: CLOUDINARY_URL
        sync: false # Optional

  # Frontend Static Site
  - type: static
    name: ruraltriage-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ruraltriage-api
          property: host
